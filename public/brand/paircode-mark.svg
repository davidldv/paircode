<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" fill="#ffffff"/>
  <!-- Accent bar -->
  <rect width="64" height="7" fill="#ff4500"/>
  <!-- Back panel (offset) -->
  <rect x="7" y="14" width="32" height="37" fill="#f4f4f0" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Front panel -->
  <rect x="17" y="20" width="32" height="37" fill="#ffffff" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Title bar on front panel -->
  <rect x="17" y="20" width="32" height="6" fill="#0a0a0a"/>
  <!-- Left code bracket -->
  <polyline points="26,36 22,42 26,48" stroke="#ff4500" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  <!-- Right code bracket -->
  <polyline points="38,36 42,42 38,48" stroke="#ff4500" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
</svg>
