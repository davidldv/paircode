<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background -->
  <rect width="40" height="40" fill="#ffffff"/>
  <!-- Connection arms -->
  <line x1="2" y1="20" x2="13" y2="20" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="27" y1="20" x2="38" y2="20" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="20" y1="2" x2="20" y2="13" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="20" y1="27" x2="20" y2="38" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Terminal pins -->
  <rect x="0" y="17" width="6" height="6" fill="#ebebeb" stroke="#0a0a0a" stroke-width="1.5"/>
  <rect x="34" y="17" width="6" height="6" fill="#ebebeb" stroke="#0a0a0a" stroke-width="1.5"/>
  <rect x="17" y="0" width="6" height="6" fill="#ebebeb" stroke="#0a0a0a" stroke-width="1.5"/>
  <rect x="17" y="34" width="6" height="6" fill="#ebebeb" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- Center processor (accent) -->
  <rect x="13" y="13" width="14" height="14" fill="#ff4500" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Internal circuit cross -->
  <line x1="20" y1="16" x2="20" y2="24" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="16" y1="20" x2="24" y2="20" stroke="#0a0a0a" stroke-width="1.5"/>
</svg>
