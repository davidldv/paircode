<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background -->
  <rect width="40" height="40" fill="#ffffff"/>
  <!-- Vertical timeline spine -->
  <line x1="10" y1="4" x2="10" y2="36" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Commit 1 (accent / latest) -->
  <rect x="6" y="5" width="8" height="8" fill="#ff4500" stroke="#0a0a0a" stroke-width="2"/>
  <rect x="17" y="6" width="19" height="6" fill="#ff4500" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- Commit 2 -->
  <rect x="6" y="18" width="8" height="8" fill="#ffffff" stroke="#0a0a0a" stroke-width="2"/>
  <rect x="17" y="19" width="13" height="6" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- Commit 3 (oldest) -->
  <rect x="6" y="31" width="8" height="8" fill="#ebebeb" stroke="#0a0a0a" stroke-width="2"/>
  <rect x="17" y="32" width="9" height="6" fill="#ebebeb" stroke="#0a0a0a" stroke-width="1.5"/>
</svg>
