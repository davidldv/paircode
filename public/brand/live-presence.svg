<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background -->
  <rect width="40" height="40" fill="#ffffff"/>
  <!-- User 1 (back / left) -->
  <rect x="3" y="11" width="14" height="12" fill="#ebebeb" stroke="#0a0a0a" stroke-width="2"/>
  <rect x="1" y="25" width="18" height="11" fill="#ebebeb" stroke="#0a0a0a" stroke-width="2"/>
  <!-- User 2 (front / right) -->
  <rect x="15" y="7" width="14" height="12" fill="#ffffff" stroke="#0a0a0a" stroke-width="2"/>
  <rect x="13" y="21" width="18" height="11" fill="#ffffff" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Live indicator (accent dot, top-right) -->
  <rect x="31" y="3" width="8" height="8" fill="#ff4500" stroke="#0a0a0a" stroke-width="2"/>
  <!-- Connection line between users -->
  <line x1="17" y1="19" x2="23" y2="15" stroke="#ff4500" stroke-width="2" stroke-dasharray="3 2"/>
</svg>
