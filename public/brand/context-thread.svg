<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background -->
  <rect width="40" height="40" fill="#ffffff"/>
  <!-- Node 1 (accent / most recent) -->
  <rect x="8" y="3" width="24" height="9" fill="#ff4500" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="15" y1="7.5" x2="27" y2="7.5" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- Connector 1 -->
  <rect x="17" y="12" width="6" height="6" fill="#0a0a0a"/>
  <!-- Node 2 (white / middle) -->
  <rect x="4" y="18" width="32" height="9" fill="#ffffff" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="10" y1="22.5" x2="28" y2="22.5" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- Connector 2 -->
  <rect x="17" y="27" width="6" height="5" fill="#0a0a0a"/>
  <!-- Node 3 (gray / oldest) -->
  <rect x="10" y="32" width="20" height="7" fill="#ebebeb" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="15" y1="35.5" x2="25" y2="35.5" stroke="#0a0a0a" stroke-width="1.5"/>
</svg>
